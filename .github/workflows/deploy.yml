name: Deploy NoteFlow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: 659775407889.dkr.ecr.us-east-1.amazonaws.com/rodrigo-falcao-noteflow-backend
  ECR_FRONTEND: 659775407889.dkr.ecr.us-east-1.amazonaws.com/rodrigo-falcao-noteflow-frontend
  ECS_CLUSTER: rodrigo-falcao-noteflow

jobs:
  build-backend:
    name: Build & push backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -q

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        run: |
          docker build --platform linux/amd64 -t $ECR_BACKEND:latest .
          docker push $ECR_BACKEND:latest

  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: music_streaming-entertainment-modern_react/package-lock.json

      - name: Build React app
        working-directory: music_streaming-entertainment-modern_react
        run: |
          npm ci
          REACT_APP_DD_ENV=sandbox npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        run: |
          docker build --platform linux/amd64 -t $ECR_FRONTEND:latest music_streaming-entertainment-modern_react
          docker push $ECR_FRONTEND:latest

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_CLUSTER-backend \
            --force-new-deployment \
            --query 'service.deployments[0].{status:status,failedTasks:failedTasks}'
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_CLUSTER-frontend \
            --force-new-deployment \
            --query 'service.deployments[0].{status:status,failedTasks:failedTasks}'
